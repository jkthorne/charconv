name: Fuzz

on:
  schedule:
    - cron: "0 3 * * 1" # Monday 3 AM UTC
  workflow_dispatch: # allow manual trigger

jobs:
  fuzz:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install dependencies
        run: shards install

      - name: Run deep fuzz tests
        env:
          FUZZ_DEEP: "5000"
          FUZZ_MAX_SIZE: "512"
        run: crystal spec spec/fuzz_spec.cr --release
